# CIRISVerify cargo-deny Configuration
# Security-focused dependency auditing

[graph]
targets = [
    "x86_64-unknown-linux-gnu",
    "aarch64-unknown-linux-gnu",
    "aarch64-unknown-linux-musl",
    "x86_64-apple-darwin",
    "aarch64-apple-darwin",
    "x86_64-pc-windows-msvc",
    "aarch64-linux-android",
    "aarch64-apple-ios",
]
all-features = true

[advisories]
# Warn about unmaintained crates in workspace deps
unmaintained = "workspace"
# Check all deps for unsound code
unsound = "all"
ignore = [
    # atty is pulled transitively via cbindgen build dep
    "RUSTSEC-2021-0145",
    # rand 0.8/0.9 unsound only with a custom Logger that holds RngCore across
    # thread-exit callbacks. We never install such a logger; the advisory is
    # not exploitable by our code paths. Reassess if rand publishes a fix.
    "RUSTSEC-2026-0097",
    # rustls-webpki name constraint issues in rustls 0.21/webpki 0.101.
    # hickory-resolver 0.24 pins rustls 0.21 internally. Upgrading to
    # hickory-resolver 0.26 requires significant API changes.
    # Low risk: requires attacker-controlled CA certs with specific name
    # constraint configurations. We use bundled Mozilla CA certs only.
    # TODO: Upgrade to hickory-resolver 0.26 when API migration is feasible.
    "RUSTSEC-2026-0098",
    "RUSTSEC-2026-0099",
    # rustls-webpki CRL parsing panic (rustls-webpki 0.101/0.103).
    # Same root cause as 0098/0099 — pinned by hickory-resolver 0.24.
    # Reachable only when parsing malformed CRL from attacker-controlled CA.
    # We use bundled Mozilla CA certs; CRL parsing not in our hot path.
    "RUSTSEC-2026-0104",
    # hickory-proto O(n²) name compression CPU exhaustion. Affects
    # encode path for outgoing DNS messages with attacker-influenced
    # name labels. We use hickory-resolver as an outbound client for
    # registry validation only — query names come from a fixed
    # configured allowlist (registry endpoint hostnames), never from
    # attacker-controlled input. Fix path requires hickory-resolver 0.26
    # which has API breaking changes; tracked alongside 0098/0099/0104.
    "RUSTSEC-2026-0119",
    # hickory-proto NSEC3 closest-encloser proof validation unbounded loop
    # (DNSSEC DoS). Reachable ONLY via `DnssecDnsHandle` "when built with the
    # dnssec-ring or dnssec-aws-lc-rs feature and configured to perform DNSSEC
    # validation" (advisory text). We enable NEITHER — hickory-resolver 0.25 is
    # built with features = ["https-ring", "tokio", "webpki-roots"] (DoH only, no
    # DNSSEC), so the vulnerable code path is not compiled/reachable. No stable
    # fix exists (patched = []; only 0.26.0-beta.1 is unaffected); revisit on the
    # hickory 0.26 stable bump (CIRISVerify#165), same as 0119.
    "RUSTSEC-2026-0118",
    # time 0.3 stack-exhaustion via the RFC 2822 *string* parser (fixed in
    # 0.3.47, which requires rustc 1.88 and would break our MSRV 1.86). `time`
    # is pulled only transitively by x509-parser (#91 accord custody attestation)
    # for ASN.1 cert-validity times (GeneralizedTime/UTCTime) — a different code
    # path. Neither x509-parser's validity handling nor any CIRISVerify code ever
    # feeds input to time's RFC 2822 `parse`, so the vulnerable path is
    # unreachable. The advisory itself notes "non-malicious input will never
    # encounter this scenario." Revisit if MSRV moves to >=1.88 (then unpin time
    # to >=0.3.47 and drop this).
    "RUSTSEC-2026-0009",
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "OpenSSL",
    "Zlib",
    "MPL-2.0",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "AGPL-3.0-or-later",
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8

[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"

# Deny specific problematic crates
deny = [
    # openssl - prefer rustls for TLS
    { name = "openssl" },
    { name = "openssl-sys" },
]

skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = [
    "https://gitlab.com/veilid/veilid",
]

[sources.allow-org]
github = ["cirisai", "RustCrypto", "aws"]
gitlab = ["veilid"]
