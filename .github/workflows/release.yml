name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write
  id-token: write  # For Sigstore keyless signing

jobs:
  # ==========================================================================
  # Build Release - Native Platforms
  # ==========================================================================
  build-native:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64 (with TPM support)
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: libciris_verify_ffi.so
            features: tpm

          # Linux ARM64 (cross-compile - native ARM64 runners have limited availability)
          # Note: TPM support disabled in cross-compile; use self-hosted ARM64 for TPM
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: libciris_verify_ffi.so
            cross: true

          # macOS x86_64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: libciris_verify_ffi.dylib

          # macOS ARM64 (Apple Silicon)
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: libciris_verify_ffi.dylib

          # Windows x86_64 (EXPERIMENTAL: native TPM via Platform Crypto Provider)
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: ciris_verify_ffi.dll
            features: tpm-windows

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          # Include git tag in cache key to bust cache on version bumps
          key: release-${{ matrix.target }}-${{ github.ref_name }}

      # Install TPM development libraries (Linux native only, not cross-compile)
      - name: Install TPM libs (Linux)
        if: runner.os == 'Linux' && !matrix.cross
        run: sudo apt-get update && sudo apt-get install -y libtss2-dev

      # Install cross for ARM64 cross-compilation
      - name: Install cross
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      # Build with cross (ARM64 Linux)
      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }} -p ciris-verify-ffi

      # Build native
      - name: Build (native)
        if: ${{ !matrix.cross }}
        shell: bash
        run: |
          FEATURES="${{ matrix.features }}"
          if [ -n "$FEATURES" ]; then
            cargo build --release --target ${{ matrix.target }} -p ciris-verify-ffi --features "$FEATURES"
          else
            cargo build --release --target ${{ matrix.target }} -p ciris-verify-ffi
          fi

      # Strip binaries (Linux/macOS)
      - name: Strip binary
        if: runner.os != 'Windows'
        run: |
          if [ -f "target/${{ matrix.target }}/release/${{ matrix.artifact }}" ]; then
            strip "target/${{ matrix.target }}/release/${{ matrix.artifact }}" || true
          fi

      # Upload artifacts
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ciris-verify-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/${{ matrix.artifact }}
          if-no-files-found: error

  # ==========================================================================
  # Build Release - Linux musl (Home Assistant / Alpine Linux)
  # ==========================================================================
  build-musl:
    name: Build (Linux ARM64 musl)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-musl

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-musl-aarch64

      - name: Install zig
        run: |
          curl -sSL https://ziglang.org/download/0.13.0/zig-linux-x86_64-0.13.0.tar.xz | tar xJ
          echo "$PWD/zig-linux-x86_64-0.13.0" >> $GITHUB_PATH

      - name: Install cargo-zigbuild
        run: cargo install cargo-zigbuild

      - name: Build static library
        run: cargo zigbuild --target aarch64-unknown-linux-musl --release -p ciris-verify-ffi

      - name: Link into shared library
        run: |
          # Rust cdylib doesn't support musl, so we link the static lib into a .so using zig
          # -lunwind resolves _Unwind_* symbols needed for backtraces
          zig cc -target aarch64-linux-musl -shared \
            -o target/aarch64-unknown-linux-musl/release/libciris_verify_ffi.so \
            -Wl,--whole-archive target/aarch64-unknown-linux-musl/release/libciris_verify_ffi.a -Wl,--no-whole-archive \
            -lunwind

      - name: Strip binary
        run: |
          # zig objcopy can't strip in-place, use temp file
          zig objcopy --strip-all \
            target/aarch64-unknown-linux-musl/release/libciris_verify_ffi.so \
            target/aarch64-unknown-linux-musl/release/libciris_verify_ffi_stripped.so
          mv target/aarch64-unknown-linux-musl/release/libciris_verify_ffi_stripped.so \
            target/aarch64-unknown-linux-musl/release/libciris_verify_ffi.so

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ciris-verify-aarch64-unknown-linux-musl
          path: target/aarch64-unknown-linux-musl/release/libciris_verify_ffi.so
          if-no-files-found: error

  # ==========================================================================
  # Build Release - Android
  # ==========================================================================
  build-android:
    name: Build (Android ${{ matrix.abi }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-linux-android
            abi: arm64-v8a
          - target: armv7-linux-androideabi
            abi: armeabi-v7a
          - target: x86_64-linux-android
            abi: x86_64

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-android-${{ matrix.abi }}

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26b
          add-to-path: true

      - name: Set NDK environment
        run: |
          echo "ANDROID_NDK_HOME=${{ steps.setup-ndk.outputs.ndk-path }}" >> $GITHUB_ENV
          echo "NDK_HOME=${{ steps.setup-ndk.outputs.ndk-path }}" >> $GITHUB_ENV

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Build for Android
        run: cargo ndk -t ${{ matrix.abi }} build --release -p ciris-verify-ffi --features android

      - name: Strip binary
        run: |
          ${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip \
            target/${{ matrix.target }}/release/libciris_verify_ffi.so || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ciris-verify-android-${{ matrix.abi }}
          path: target/${{ matrix.target }}/release/libciris_verify_ffi.so
          if-no-files-found: error

  # ==========================================================================
  # Build Release - iOS
  # ==========================================================================
  build-ios:
    name: Build (iOS ${{ matrix.target }})
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-ios
            sdk: iphoneos
          - target: aarch64-apple-ios-sim
            sdk: iphonesimulator

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-ios-${{ matrix.target }}

      - name: Build for iOS
        run: |
          # Bake in the framework install name at build time so install_name_tool
          # doesn't need to modify the binary post-build (which shifts code sections
          # and breaks binary hash + function integrity verification).
          RUSTFLAGS="-C link-arg=-install_name -C link-arg=@rpath/CIRISVerify.framework/CIRISVerify" \
            cargo build --release --target ${{ matrix.target }} -p ciris-verify-ffi --features ios

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ciris-verify-ios-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/libciris_verify_ffi.a
            target/${{ matrix.target }}/release/libciris_verify_ffi.dylib
          if-no-files-found: error

  # ==========================================================================
  # Create XCFramework (iOS)
  # ==========================================================================
  xcframework:
    name: Create XCFramework
    needs: build-ios
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download iOS artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: ciris-verify-ios-*
          path: ios-libs
          merge-multiple: false

      - name: Create XCFramework
        run: |
          mkdir -p xcframework-build/ios xcframework-build/ios-sim

          # Copy libraries
          cp ios-libs/ciris-verify-ios-aarch64-apple-ios/libciris_verify_ffi.a xcframework-build/ios/
          cp ios-libs/ciris-verify-ios-aarch64-apple-ios-sim/libciris_verify_ffi.a xcframework-build/ios-sim/

          # Generate module map
          cat > xcframework-build/module.modulemap << 'EOF'
          module CirisVerify {
              header "ciris_verify.h"
              export *
          }
          EOF

          # Copy to both directories
          cp xcframework-build/module.modulemap xcframework-build/ios/
          cp xcframework-build/module.modulemap xcframework-build/ios-sim/

          # Create XCFramework
          xcodebuild -create-xcframework \
            -library xcframework-build/ios/libciris_verify_ffi.a \
            -library xcframework-build/ios-sim/libciris_verify_ffi.a \
            -output CirisVerify.xcframework

      - name: Upload XCFramework
        uses: actions/upload-artifact@v4
        with:
          name: CirisVerify.xcframework
          path: CirisVerify.xcframework
          if-no-files-found: error

  # ==========================================================================
  # Create Android AAR
  # ==========================================================================
  android-aar:
    name: Create Android AAR
    needs: build-android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Android artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: ciris-verify-android-*
          path: android-libs
          merge-multiple: false

      - name: Create AAR structure
        run: |
          mkdir -p aar/jni/arm64-v8a aar/jni/armeabi-v7a aar/jni/x86_64

          # Copy native libraries
          cp android-libs/ciris-verify-android-arm64-v8a/libciris_verify_ffi.so aar/jni/arm64-v8a/
          cp android-libs/ciris-verify-android-armeabi-v7a/libciris_verify_ffi.so aar/jni/armeabi-v7a/
          cp android-libs/ciris-verify-android-x86_64/libciris_verify_ffi.so aar/jni/x86_64/

          # Create AndroidManifest.xml
          cat > aar/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="ai.ciris.verify">
              <uses-sdk android:minSdkVersion="21" android:targetSdkVersion="34" />
          </manifest>
          EOF

          # Create AAR
          cd aar && zip -r ../ciris-verify.aar . && cd ..

      - name: Upload AAR
        uses: actions/upload-artifact@v4
        with:
          name: ciris-verify.aar
          path: ciris-verify.aar
          if-no-files-found: error

  # ==========================================================================
  # Generate C Header
  # ==========================================================================
  generate-header:
    name: Generate C Header
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install cbindgen
        run: cargo install cbindgen

      - name: Generate header
        run: |
          cbindgen --config cbindgen.toml --crate ciris-verify-ffi --output ciris_verify.h || \
          cbindgen --crate ciris-verify-ffi --output ciris_verify.h --lang c

      - name: Upload header
        uses: actions/upload-artifact@v4
        with:
          name: ciris_verify.h
          path: ciris_verify.h
          if-no-files-found: warn

  # ==========================================================================
  # Build Manifest Tool (runs in parallel with other builds)
  # ==========================================================================
  build-manifest-tool:
    name: Build Manifest Tool
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          # IMPORTANT: Include tag to bust cache on version bumps
          # Without this, stale manifest-tool binary may be used (missing metadata field)
          key: manifest-tool-${{ github.ref_name }}

      - name: Build manifest tool
        run: cargo build --release -p ciris-manifest-tool

      - name: Upload manifest tool
        uses: actions/upload-artifact@v4
        with:
          name: ciris-manifest-tool
          path: target/release/ciris-manifest-tool
          if-no-files-found: error

  # ==========================================================================
  # Build Build Tool (v1.8 BuildManifest CLIs) — multi-platform for PyPI wheels
  # ==========================================================================
  # As of v1.8.6, ciris-build-sign + ciris-build-verify ship inside the
  # platform-tagged ciris-verify wheels (publish-pypi job) so consumers get
  # them via `pip install ciris-verify` automatically. The matrix below
  # mirrors the publish-pypi platform set so each wheel has a matching binary.
  build-build-tool:
    name: Build Build Tool (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ext: ""
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            ext: ""
            cross: true
          - os: macos-latest
            target: x86_64-apple-darwin
            ext: ""
          - os: macos-latest
            target: aarch64-apple-darwin
            ext: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: ".exe"

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: build-tool-${{ matrix.target }}-${{ github.ref_name }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build build-tool (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }} -p ciris-build-tool --features ciris-crypto/pqc-ml-dsa

      - name: Build build-tool (native)
        if: ${{ !matrix.cross }}
        shell: bash
        run: cargo build --release --target ${{ matrix.target }} -p ciris-build-tool --features ciris-crypto/pqc-ml-dsa

      - name: Strip binaries
        if: runner.os != 'Windows'
        run: |
          strip target/${{ matrix.target }}/release/ciris-build-sign || true
          strip target/${{ matrix.target }}/release/ciris-build-verify || true

      - name: Stage binaries for upload
        shell: bash
        run: |
          mkdir -p stage
          cp "target/${{ matrix.target }}/release/ciris-build-sign${{ matrix.ext }}" stage/
          cp "target/${{ matrix.target }}/release/ciris-build-verify${{ matrix.ext }}" stage/

      - name: Upload build-tool artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-tool-${{ matrix.target }}
          path: stage/
          if-no-files-found: error

  # ==========================================================================
  # Create Release
  # ==========================================================================
  create-release:
    name: Create Release
    needs: [build-native, build-musl, build-android, build-ios, xcframework, android-aar, generate-header, build-manifest-tool, build-build-tool]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release

          # Copy native libraries
          for dir in artifacts/ciris-verify-x86_64-* artifacts/ciris-verify-aarch64-*; do
            if [ -d "$dir" ]; then
              target=$(basename "$dir" | sed 's/ciris-verify-//')
              mkdir -p "release/$target"
              cp -r "$dir"/* "release/$target/" || true
            fi
          done

          # Copy Android libraries
          for dir in artifacts/ciris-verify-android-*; do
            if [ -d "$dir" ]; then
              abi=$(basename "$dir" | sed 's/ciris-verify-android-//')
              mkdir -p "release/android/$abi"
              cp -r "$dir"/* "release/android/$abi/" || true
            fi
          done

          # Copy iOS libraries
          for dir in artifacts/ciris-verify-ios-*; do
            if [ -d "$dir" ]; then
              target=$(basename "$dir" | sed 's/ciris-verify-ios-//')
              mkdir -p "release/ios/$target"
              cp -r "$dir"/* "release/ios/$target/" || true
            fi
          done

          # Copy packages
          cp -r artifacts/CirisVerify.xcframework release/ || true
          cp artifacts/ciris-verify.aar/ciris-verify.aar release/ || true
          cp artifacts/ciris_verify.h/ciris_verify.h release/ || true

          # Copy build-tool CLIs (v1.8 BuildManifest sign/verify)
          # As of v1.8.6 the build-build-tool job is multi-platform; the
          # linux-x86_64 binaries here populate the legacy
          # ciris-verify-${tag}-build-tool-linux-x86_64.tar.gz release asset
          # and the dogfood self-attestation step. The other platforms ship
          # inside their respective PyPI wheels (publish-pypi job).
          mkdir -p release/build-tool
          cp artifacts/build-tool-x86_64-unknown-linux-gnu/ciris-build-sign release/build-tool/ 2>/dev/null || true
          cp artifacts/build-tool-x86_64-unknown-linux-gnu/ciris-build-verify release/build-tool/ 2>/dev/null || true
          chmod +x release/build-tool/* 2>/dev/null || true

          # Create checksums
          cd release
          find . -type f \( -name "*.so" -o -name "*.dylib" -o -name "*.dll" -o -name "*.a" -o -name "*.aar" \) \
            -exec sha256sum {} \; > SHA256SUMS

          # Create archives
          cd ..
          tar -czvf ciris-verify-${{ github.ref_name }}-linux-x86_64.tar.gz -C release x86_64-unknown-linux-gnu || true
          tar -czvf ciris-verify-${{ github.ref_name }}-linux-arm64.tar.gz -C release aarch64-unknown-linux-gnu || true
          tar -czvf ciris-verify-${{ github.ref_name }}-linux-arm64-musl.tar.gz -C release aarch64-unknown-linux-musl || true
          tar -czvf ciris-verify-${{ github.ref_name }}-macos-x86_64.tar.gz -C release x86_64-apple-darwin || true
          tar -czvf ciris-verify-${{ github.ref_name }}-macos-arm64.tar.gz -C release aarch64-apple-darwin || true
          tar -czvf ciris-verify-${{ github.ref_name }}-android.tar.gz -C release android || true
          tar -czvf ciris-verify-${{ github.ref_name }}-ios.tar.gz -C release ios CirisVerify.xcframework || true
          zip -r ciris-verify-${{ github.ref_name }}-windows-x86_64.zip release/x86_64-pc-windows-msvc || true
          tar -czvf ciris-verify-${{ github.ref_name }}-build-tool-linux-x86_64.tar.gz -C release build-tool || true

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign release artifacts with Sigstore
        run: |
          # Sign all archives with keyless signing (OIDC from GitHub Actions)
          for file in ciris-verify-*.tar.gz ciris-verify-*.zip; do
            if [ -f "$file" ]; then
              echo "Signing $file..."
              cosign sign-blob --yes --output-signature "${file}.sig" --output-certificate "${file}.pem" "$file"
            fi
          done

          # Sign the AAR and header
          for file in release/ciris-verify.aar release/ciris_verify.h; do
            if [ -f "$file" ]; then
              base=$(basename "$file")
              echo "Signing $base..."
              cosign sign-blob --yes --output-signature "release/${base}.sig" --output-certificate "release/${base}.pem" "$file"
            fi
          done

          # Sign SHA256SUMS
          cosign sign-blob --yes --output-signature release/SHA256SUMS.sig --output-certificate release/SHA256SUMS.pem release/SHA256SUMS

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ciris-verify-*.tar.gz
            ciris-verify-*.tar.gz.sig
            ciris-verify-*.tar.gz.pem
            ciris-verify-*.zip
            ciris-verify-*.zip.sig
            ciris-verify-*.zip.pem
            release/ciris-verify.aar
            release/ciris-verify.aar.sig
            release/ciris-verify.aar.pem
            release/SHA256SUMS
            release/SHA256SUMS.sig
            release/SHA256SUMS.pem
            release/ciris_verify.h
            release/ciris_verify.h.sig
            release/ciris_verify.h.pem
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}

      # Generate manifest.json with all platform hashes for Portal/Registry
      - name: Generate distribution manifest
        run: |
          python3 -c "
          import json, hashlib, os, glob

          manifest = {
              'name': 'ciris-verify',
              'version': '${{ github.ref_name }}'.lstrip('v'),
              'built_at': '$(date -u +%Y-%m-%dT%H:%M:%SZ)',
              'release_url': 'https://github.com/CIRISAI/CIRISVerify/releases/tag/${{ github.ref_name }}',
              'platforms': {}
          }

          # Hash code portion of __TEXT for Mach-O binaries (code-sign-stable)
          import struct

          def macho_text_hash(fpath):
              '''Hash code portion of __TEXT from page-aligned boundary.
              Code signing adds LC_CODE_SIGNATURE (16 bytes), changing sizeofcmds.
              Page-aligning to 4096 ensures identical hash start regardless of signing.'''
              data = open(fpath, 'rb').read()
              magic = struct.unpack_from('<I', data, 0)[0]
              if magic == 0xFEEDFACF:  # MH_MAGIC_64
                  sizeofcmds = struct.unpack_from('<I', data, 20)[0]
                  header_size = 32  # sizeof(mach_header_64)
                  cmds_end = header_size + sizeofcmds
                  page_aligned = (cmds_end + 0xFFF) & ~0xFFF  # round up to 4096
                  ncmds = struct.unpack_from('<I', data, 16)[0]
                  off = header_size
                  for _ in range(ncmds):
                      cmd, cmdsize = struct.unpack_from('<II', data, off)
                      if cmd == 0x19:  # LC_SEGMENT_64
                          segname = data[off+8:off+24].split(b'\\x00')[0].decode('ascii', errors='replace')
                          fileoff, filesize = struct.unpack_from('<QQ', data, off+40)
                          if segname == '__TEXT':
                              hash_start = max(page_aligned, fileoff)
                              hash_end = fileoff + filesize
                              seg_data = data[hash_start:hash_end]
                              return hashlib.sha256(seg_data).hexdigest(), hash_start, hash_end - hash_start
                      off += cmdsize
              # Fallback: hash full file
              return hashlib.sha256(data).hexdigest(), 0, len(data)

          # Map target dirs to platform names
          platform_map = {
              'x86_64-unknown-linux-gnu': 'linux-x86_64',
              'aarch64-unknown-linux-gnu': 'linux-arm64',
              'x86_64-apple-darwin': 'darwin-x86_64',
              'aarch64-apple-darwin': 'darwin-arm64',
              'x86_64-pc-windows-msvc': 'windows-x86_64',
          }

          for target_dir, platform in platform_map.items():
              base = f'release/{target_dir}'
              if os.path.isdir(base):
                  manifest['platforms'][platform] = {}
                  for f in os.listdir(base):
                      fpath = os.path.join(base, f)
                      if os.path.isfile(fpath):
                          kind = 'dylib' if f.endswith('.dylib') else 'shared' if f.endswith('.so') else 'dll' if f.endswith('.dll') else 'static'
                          # macOS dylibs use __TEXT hash (same as iOS) for code-sign stability
                          if kind == 'dylib' and f.endswith('.dylib'):
                              h_text, seg_off, seg_sz = macho_text_hash(fpath)
                              h_full = hashlib.sha256(open(fpath, 'rb').read()).hexdigest()
                              manifest['platforms'][platform][kind] = {
                                  'file': f, 'sha256': h_text, 'sha256_full': h_full, 'size': os.path.getsize(fpath),
                                  'text_offset': seg_off, 'text_size': seg_sz
                              }
                          else:
                              h = hashlib.sha256(open(fpath, 'rb').read()).hexdigest()
                              manifest['platforms'][platform][kind] = {
                                  'file': f, 'sha256': h, 'size': os.path.getsize(fpath)
                              }

          # Android
          for abi in ['arm64-v8a', 'armeabi-v7a', 'x86_64']:
              sopath = f'release/android/{abi}/libciris_verify_ffi.so'
              if os.path.isfile(sopath):
                  h = hashlib.sha256(open(sopath, 'rb').read()).hexdigest()
                  manifest['platforms'][f'android-{abi}'] = {
                      'shared': {'file': 'libciris_verify_ffi.so', 'sha256': h, 'size': os.path.getsize(sopath)}
                  }

          # iOS (uses same macho_text_hash defined above)
          for target in ['aarch64-apple-ios', 'aarch64-apple-ios-sim']:
              apath = f'release/ios/{target}/libciris_verify_ffi.a'
              dpath = f'release/ios/{target}/libciris_verify_ffi.dylib'
              pname = 'ios-arm64' if target == 'aarch64-apple-ios' else 'ios-sim-arm64'
              entry = {}
              if os.path.isfile(apath):
                  h = hashlib.sha256(open(apath, 'rb').read()).hexdigest()
                  entry['static'] = {'file': 'libciris_verify_ffi.a', 'sha256': h, 'size': os.path.getsize(apath)}
              if os.path.isfile(dpath):
                  h_text, seg_off, seg_sz = macho_text_hash(dpath)
                  h_full = hashlib.sha256(open(dpath, 'rb').read()).hexdigest()
                  entry['dylib'] = {'file': 'libciris_verify_ffi.dylib', 'sha256': h_text, 'sha256_full': h_full, 'size': os.path.getsize(dpath), 'text_offset': seg_off, 'text_size': seg_sz}
              if entry:
                  manifest['platforms'][pname] = entry

          print(json.dumps(manifest, indent=2))
          with open('release/manifest.json', 'w') as f:
              json.dump(manifest, f, indent=2)
          "

      - name: Upload manifest to release
        uses: softprops/action-gh-release@v1
        with:
          files: release/manifest.json

      # Generate and upload function manifests for runtime verification
      - name: Download manifest tool
        uses: actions/download-artifact@v4
        with:
          name: ciris-manifest-tool
          path: manifest-tool

      - name: Make manifest tool executable
        run: chmod +x manifest-tool/ciris-manifest-tool

      - name: Generate function manifests
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"

          mkdir -p function-manifests

          # Map artifact paths to targets
          # Target names must match what CIRISVerify's detect_target() returns at runtime
          # Desktop/iOS: Rust target triples
          # Android: ABI names (android-arm64-v8a, etc.) - see constructor.rs:308-315
          declare -A TARGET_MAP=(
            ["release/x86_64-unknown-linux-gnu/libciris_verify_ffi.so"]="x86_64-unknown-linux-gnu"
            ["release/aarch64-unknown-linux-gnu/libciris_verify_ffi.so"]="aarch64-unknown-linux-gnu"
            ["release/x86_64-apple-darwin/libciris_verify_ffi.dylib"]="x86_64-apple-darwin"
            ["release/aarch64-apple-darwin/libciris_verify_ffi.dylib"]="aarch64-apple-darwin"
            ["release/x86_64-pc-windows-msvc/ciris_verify_ffi.dll"]="x86_64-pc-windows-msvc"
            ["release/android/arm64-v8a/libciris_verify_ffi.so"]="android-arm64-v8a"
            ["release/android/armeabi-v7a/libciris_verify_ffi.so"]="android-armeabi-v7a"
            ["release/android/x86_64/libciris_verify_ffi.so"]="android-x86_64"
            ["release/ios/aarch64-apple-ios/libciris_verify_ffi.dylib"]="aarch64-apple-ios"
            ["release/ios/aarch64-apple-ios-sim/libciris_verify_ffi.dylib"]="aarch64-apple-ios-sim"
          )

          for binary_path in "${!TARGET_MAP[@]}"; do
            if [ -f "$binary_path" ]; then
              target="${TARGET_MAP[$binary_path]}"
              echo "Generating function manifest for $target..."

              ./manifest-tool/ciris-manifest-tool generate \
                --binary "$binary_path" \
                --target "$target" \
                --version "$VERSION" \
                --output "function-manifests/${target}.json" \
                || echo "Warning: Failed to generate manifest for $target"
            fi
          done

          echo "Generated manifests:"
          ls -la function-manifests/

      - name: Upload function manifests to Registry
        if: ${{ !contains(github.ref_name, '-rc') && !contains(github.ref_name, '-beta') }}
        env:
          REGISTRY_ADMIN_TOKEN: ${{ secrets.REGISTRY_ADMIN_TOKEN }}
          REGISTRY_URL: ${{ vars.REGISTRY_URL }}
        run: |
          REGISTRY_BASE="${REGISTRY_URL:-https://api.registry.ciris-services-1.ai}"
          for manifest in function-manifests/*.json; do
            if [ -f "$manifest" ]; then
              target=$(basename "$manifest" .json)
              echo "Uploading function manifest for $target to ${REGISTRY_BASE}..."

              curl -sf -X POST \
                "${REGISTRY_BASE}/v1/verify/function-manifest" \
                -H "Authorization: Bearer ${REGISTRY_ADMIN_TOKEN}" \
                -H "Content-Type: application/json" \
                -d @"$manifest" \
                && echo "  -> Success" \
                || echo "  -> Warning: Upload failed (endpoint may require signing)"
            fi
          done

      # =====================================================================
      # Dogfood: sign every function manifest as a BuildPrimitive::Verify
      # BuildManifest using the same ciris-build-sign CLI we ship to other
      # primitives. This is the recursive golden rule (PoB §1) made
      # operational — CIRISVerify produces signed BuildManifests for its
      # own builds through the same machinery it asks every consumer to use.
      # The signed BuildManifests ship as release artifacts and as POSTs
      # to the registry's `/v1/verify/build-manifest` endpoint when
      # available (best-effort; falls back to a warning if endpoint 404s).
      # =====================================================================
      - name: Sign function manifests with ciris-build-sign (self-attestation)
        if: ${{ !contains(github.ref_name, '-rc') && !contains(github.ref_name, '-beta') }}
        env:
          CIRIS_BUILD_ED25519_SECRET: ${{ secrets.CIRIS_BUILD_ED25519_SECRET }}
          CIRIS_BUILD_MLDSA_SECRET: ${{ secrets.CIRIS_BUILD_MLDSA_SECRET }}
        run: |
          set -e
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"

          BUILD_SIGN=release/build-tool/ciris-build-sign
          if [ ! -x "$BUILD_SIGN" ]; then
            echo "ciris-build-sign binary missing; skipping self-attestation step"
            exit 0
          fi

          if [ -z "${CIRIS_BUILD_ED25519_SECRET:-}" ] || [ -z "${CIRIS_BUILD_MLDSA_SECRET:-}" ]; then
            echo "Steward secrets not present in env; skipping self-attestation"
            exit 0
          fi

          # Steward keys are stored in GHA secrets. The encoding (hex vs
          # base64 vs raw) depends on how they were set, so try each in
          # order. Both should decode to 32 raw bytes for an ed25519 seed
          # and 32 raw bytes for an ML-DSA-65 seed.
          mkdir -p /tmp/steward-keys
          chmod 0700 /tmp/steward-keys

          decode_secret() {
            local secret_value="$1"
            local out_path="$2"
            local label="$3"

            # Strip whitespace + newlines first (GHA sometimes adds them).
            local cleaned
            cleaned=$(printf '%s' "$secret_value" | tr -d '[:space:]')

            # Try hex (64 hex chars = 32 raw bytes — common steward-key format)
            if [ "${#cleaned}" -eq 64 ] && printf '%s' "$cleaned" | grep -qE '^[0-9a-fA-F]+$'; then
              printf '%s' "$cleaned" | xxd -r -p > "$out_path"
              if [ "$(wc -c < "$out_path")" -eq 32 ]; then
                echo "  $label: decoded as hex (32 bytes)"
                return 0
              fi
            fi

            # Try base64 (most common alt encoding)
            if printf '%s' "$cleaned" | base64 -d > "$out_path" 2>/dev/null && [ -s "$out_path" ]; then
              local sz
              sz=$(wc -c < "$out_path")
              if [ "$sz" -eq 32 ]; then
                echo "  $label: decoded as base64 (32 bytes)"
                return 0
              fi
              echo "  $label: base64 decode produced $sz bytes (expected 32)"
            fi

            # Fall back: write raw bytes (unlikely for GHA but possible if
            # the secret was set with `gh secret set --body $(...)` from
            # a binary source).
            printf '%s' "$secret_value" > "$out_path"
            local sz
            sz=$(wc -c < "$out_path")
            if [ "$sz" -eq 32 ]; then
              echo "  $label: stored as raw bytes (32 bytes)"
              return 0
            fi

            echo "  $label: ERROR — could not decode to 32 bytes (got $sz). Check secret encoding."
            return 1
          }

          decode_secret "$CIRIS_BUILD_ED25519_SECRET" /tmp/steward-keys/ed25519.seed "ed25519"
          decode_secret "$CIRIS_BUILD_MLDSA_SECRET" /tmp/steward-keys/mldsa65.secret "mldsa65"
          chmod 0600 /tmp/steward-keys/*

          # Sanity-check the crypto primitives are working before consuming
          # the steward keys.
          "$BUILD_SIGN" self-test

          mkdir -p signed-build-manifests
          for manifest in function-manifests/*.json; do
            [ -f "$manifest" ] || continue
            target=$(basename "$manifest" .json)
            echo "Signing function manifest for $target as BuildPrimitive::Verify..."

            "$BUILD_SIGN" sign \
              --primitive verify \
              --build-id "v${VERSION}" \
              --target "$target" \
              --binary-version "$VERSION" \
              --manifest-from "$manifest" \
              --ed25519-seed /tmp/steward-keys/ed25519.seed \
              --mldsa-secret /tmp/steward-keys/mldsa65.secret \
              --key-id "verify-steward-2026" \
              --output "signed-build-manifests/${target}.json"
          done

          # Wipe key files immediately after signing.
          shred -u /tmp/steward-keys/* || rm -f /tmp/steward-keys/*
          rmdir /tmp/steward-keys || true

          echo "Signed BuildManifests:"
          ls -la signed-build-manifests/
          echo "Total: $(ls signed-build-manifests/*.json 2>/dev/null | wc -l) signed manifests"

      - name: Upload signed BuildManifests as release assets
        if: ${{ !contains(github.ref_name, '-rc') && !contains(github.ref_name, '-beta') }}
        run: |
          if [ -d signed-build-manifests ] && [ "$(ls -A signed-build-manifests 2>/dev/null)" ]; then
            tar -czvf ciris-verify-${{ github.ref_name }}-signed-build-manifests.tar.gz \
              signed-build-manifests/
          else
            echo "No signed manifests to package; skipping tarball"
          fi

      - name: Attach signed BuildManifests to GitHub release
        if: ${{ !contains(github.ref_name, '-rc') && !contains(github.ref_name, '-beta') }}
        uses: softprops/action-gh-release@v1
        with:
          files: ciris-verify-${{ github.ref_name }}-signed-build-manifests.tar.gz
          fail_on_unmatched_files: false

      # Eat our own dogfood: register all 3 registry tables atomically via
      # the v1.10.0+ `ciris-build-sign register` subcommand. Replaces the
      # previous per-target curl POST loop + separate manual binary-manifest
      # construction. As of v1.10.1 the build_id row is written via the new
      # HTTP POST /v1/builds endpoint (CIRISRegistry#9), so REGISTRY_JWT_SECRET
      # is no longer required; only REGISTRY_ADMIN_TOKEN.
      #
      # Sets `--project ciris-verify` explicitly so binary_manifests rows
      # land under the right project namespace (the previous step omitted
      # the project field, which made the server default it to "ciris-agent"
      # — cross-project pollution that masked v1.10.0's missing parent rows).
      - name: Register release with CIRISRegistry (verify dogfood)
        if: ${{ !contains(github.ref_name, '-rc') && !contains(github.ref_name, '-beta') }}
        env:
          REGISTRY_ADMIN_TOKEN: ${{ secrets.REGISTRY_ADMIN_TOKEN }}
          REGISTRY_URL: ${{ vars.REGISTRY_URL }}
          CIRIS_BUILD_ED25519_SECRET: ${{ secrets.CIRIS_BUILD_ED25519_SECRET }}
          CIRIS_BUILD_MLDSA_SECRET: ${{ secrets.CIRIS_BUILD_MLDSA_SECRET }}
        run: |
          set -e
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"

          BUILD_SIGN=release/build-tool/ciris-build-sign
          if [ ! -x "$BUILD_SIGN" ]; then
            echo "ciris-build-sign binary missing; skipping register step"
            exit 0
          fi
          if [ ! -d signed-build-manifests ] || [ -z "$(ls -A signed-build-manifests 2>/dev/null)" ]; then
            echo "No signed manifests to register; skipping"
            exit 0
          fi
          if [ -z "${CIRIS_BUILD_ED25519_SECRET:-}" ] || [ -z "${CIRIS_BUILD_MLDSA_SECRET:-}" ]; then
            echo "Steward secrets missing; cannot sign CanonicalBuild for /v1/builds row"
            exit 0
          fi

          # Reconstitute the steward keys (same hex|base64|raw decoder as the
          # earlier sign step) so register can sign the CanonicalBuild.
          mkdir -p /tmp/steward-keys
          chmod 0700 /tmp/steward-keys
          decode_secret() {
            local secret_value="$1" out_path="$2" label="$3" cleaned
            cleaned=$(printf '%s' "$secret_value" | tr -d '[:space:]')
            if [ "${#cleaned}" -eq 64 ] && printf '%s' "$cleaned" | grep -qE '^[0-9a-fA-F]+$'; then
              printf '%s' "$cleaned" | xxd -r -p > "$out_path"
              [ "$(wc -c < "$out_path")" -eq 32 ] && return 0
            fi
            if printf '%s' "$cleaned" | base64 -d > "$out_path" 2>/dev/null && [ "$(wc -c < "$out_path")" -eq 32 ]; then
              return 0
            fi
            printf '%s' "$secret_value" > "$out_path"
            [ "$(wc -c < "$out_path")" -eq 32 ]
          }
          decode_secret "$CIRIS_BUILD_ED25519_SECRET" /tmp/steward-keys/ed25519.seed "ed25519"
          decode_secret "$CIRIS_BUILD_MLDSA_SECRET" /tmp/steward-keys/mldsa65.secret "mldsa65"
          chmod 0600 /tmp/steward-keys/*

          # Build --target args from each signed BuildManifest
          target_args=()
          for manifest in signed-build-manifests/*.json; do
            [ -f "$manifest" ] || continue
            target=$(basename "$manifest" .json)
            target_args+=(--target "${target}:${manifest}")
          done

          if [ "${#target_args[@]}" -eq 0 ]; then
            echo "No --target args derived; skipping"
            shred -u /tmp/steward-keys/* || rm -f /tmp/steward-keys/*
            rmdir /tmp/steward-keys || true
            exit 0
          fi

          REGISTRY_BASE="${REGISTRY_URL:-https://api.registry.ciris-services-1.ai}"
          echo "Registering ciris-verify ${VERSION} with ${#target_args[@]} targets..."
          "$BUILD_SIGN" register \
            --project ciris-verify \
            --binary-version "$VERSION" \
            --build-id "${{ github.sha }}" \
            --modules core \
            --source-repo "https://github.com/CIRISAI/CIRISVerify" \
            --source-commit "${{ github.sha }}" \
            --ed25519-seed /tmp/steward-keys/ed25519.seed \
            --mldsa-secret /tmp/steward-keys/mldsa65.secret \
            --key-id "verify-steward-2026" \
            --registry-url "$REGISTRY_BASE" \
            "${target_args[@]}"

          # Wipe key files after use.
          shred -u /tmp/steward-keys/* || rm -f /tmp/steward-keys/*
          rmdir /tmp/steward-keys || true

  # ==========================================================================
  # Publish Python Wheels to PyPI
  # Uses the SAME FFI binaries that are registered in the manifest
  # ==========================================================================
  publish-pypi:
    name: Publish PyPI (${{ matrix.platform }})
    needs: [build-native, build-build-tool, create-release]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: manylinux_x86_64
            artifact: ciris-verify-x86_64-unknown-linux-gnu
            build_tool_artifact: build-tool-x86_64-unknown-linux-gnu
            lib_name: libciris_verify_ffi.so
            bin_ext: ""

          - os: ubuntu-latest
            platform: manylinux_aarch64
            artifact: ciris-verify-aarch64-unknown-linux-gnu
            build_tool_artifact: build-tool-aarch64-unknown-linux-gnu
            lib_name: libciris_verify_ffi.so
            bin_ext: ""

          - os: macos-latest
            platform: macosx_x86_64
            artifact: ciris-verify-x86_64-apple-darwin
            build_tool_artifact: build-tool-x86_64-apple-darwin
            lib_name: libciris_verify_ffi.dylib
            bin_ext: ""

          - os: macos-latest
            platform: macosx_arm64
            artifact: ciris-verify-aarch64-apple-darwin
            build_tool_artifact: build-tool-aarch64-apple-darwin
            lib_name: libciris_verify_ffi.dylib
            bin_ext: ""

          - os: windows-latest
            platform: win_amd64
            artifact: ciris-verify-x86_64-pc-windows-msvc
            build_tool_artifact: build-tool-x86_64-pc-windows-msvc
            lib_name: ciris_verify_ffi.dll
            bin_ext: ".exe"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download FFI artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ffi-lib

      - name: Download build-tool artifact (ciris-build-sign + ciris-build-verify)
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.build_tool_artifact }}
          path: build-tool-bin

      - name: Build wheel
        shell: bash
        run: |
          cd bindings/python

          # Install build dependencies
          pip install build wheel setuptools

          # Copy the CI-built FFI library into the package
          cp ../../ffi-lib/${{ matrix.lib_name }} ciris_verify/

          # Bundle ciris-build-sign + ciris-build-verify into the wheel
          # (v1.8.6+: console scripts ciris-build-sign / ciris-build-verify
          # are Python shims that os.execv to these binaries)
          mkdir -p ciris_verify/_bin
          cp ../../build-tool-bin/ciris-build-sign${{ matrix.bin_ext }} ciris_verify/_bin/
          cp ../../build-tool-bin/ciris-build-verify${{ matrix.bin_ext }} ciris_verify/_bin/
          chmod +x ciris_verify/_bin/* || true

          # Build the wheel
          python -m build --wheel

          # Rename wheel to platform-specific tag
          cd dist
          WHEEL=$(ls *.whl)
          # Extract version from wheel name
          VERSION=$(echo $WHEEL | sed -E 's/ciris_verify-([0-9.]+)-.*/\1/')

          # Determine Python tag and platform tag
          case "${{ matrix.platform }}" in
            manylinux_x86_64)
              NEW_NAME="ciris_verify-${VERSION}-py3-none-manylinux_2_17_x86_64.manylinux2014_x86_64.whl"
              ;;
            manylinux_aarch64)
              NEW_NAME="ciris_verify-${VERSION}-py3-none-manylinux_2_17_aarch64.manylinux2014_aarch64.whl"
              ;;
            macosx_x86_64)
              NEW_NAME="ciris_verify-${VERSION}-py3-none-macosx_10_12_x86_64.whl"
              ;;
            macosx_arm64)
              NEW_NAME="ciris_verify-${VERSION}-py3-none-macosx_11_0_arm64.whl"
              ;;
            win_amd64)
              NEW_NAME="ciris_verify-${VERSION}-py3-none-win_amd64.whl"
              ;;
          esac

          mv "$WHEEL" "$NEW_NAME"
          echo "Built wheel: $NEW_NAME"
          ls -la

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.platform }}
          path: bindings/python/dist/*.whl

  # ==========================================================================
  # Upload All Wheels to PyPI
  # ==========================================================================
  pypi-upload:
    name: Upload to PyPI
    needs: publish-pypi
    runs-on: ubuntu-latest
    if: ${{ !contains(github.ref_name, '-rc') && !contains(github.ref_name, '-beta') && !contains(github.ref_name, '-alpha') }}
    environment:
      name: pypi
      url: https://pypi.org/project/ciris-verify/
    permissions:
      id-token: write  # For trusted publishing
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download all wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheel-*
          path: wheels
          merge-multiple: true

      - name: Build source distribution
        run: |
          cd bindings/python
          pip install build
          python -m build --sdist
          cp dist/*.tar.gz ../../wheels/

      - name: List wheels
        run: ls -la wheels/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: wheels/
          skip-existing: true
