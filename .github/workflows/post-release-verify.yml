# Post-release live-registry verification.
#
# Runs AFTER the Release workflow succeeds on a tag push. Pulls the
# just-published wheel from PyPI (not from the run's artifact store) and
# exercises it against the live registry. This is the gate that makes a
# release truly "shipped" — green here means downstream pip-install users
# get a working artifact end-to-end.
#
# Specifically this locks:
#  - v1.12.0+ #10 fix: one client serves multiple projects in one verify
#    cycle. Engine reads its own L1/L2 manifest under ciris-verify AND
#    the agent's L4 build under ciris-agent; both must succeed.
#  - v1.12.0+ #11 fix: regional fallback hosts (us./eu.registry...) resolve.
#  - Wheel bundling: bundled .so SHA-256 == registered binary_hash for the
#    tag's version.
#
# A failure here flags the tag's checks as red but does NOT yank the
# already-published wheels — recovery is a manual yank + bug fix. By
# design the published artifacts stay live so users with `==<tag>` pins
# don't suddenly break.

name: Post-Release Live Verify
on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]

jobs:
  live-verify:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      startsWith(github.event.workflow_run.head_branch, 'v')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Resolve published version
        id: ver
        run: |
          # workflow_run's head_branch is the tag name (e.g. "v1.12.0").
          VER="${{ github.event.workflow_run.head_branch }}"
          VER="${VER#v}"
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "tag=v$VER" >> "$GITHUB_OUTPUT"
          echo "Verifying v$VER end-to-end against live registry"

      - name: Checkout repo at the tag
        # The wheel bundles libciris_verify_ffi.so + ciris-build-{sign,verify}
        # but NOT the ciris-verify CLI itself (that's a Rust-only artifact, see
        # release.yml's tarball uploads). For the cross-project attest gate
        # we need the version-pinned CLI source so cargo can build it.
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.ver.outputs.tag }}

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: post-release-verify

      - name: Build ciris-verify CLI from the v$tag source
        # Locked build off the tagged source so the CLI matches the published
        # release exactly. Used for the cross-project attest test.
        run: cargo build --release --locked -p ciris-verify-core --bin ciris-verify

      - name: Wait for PyPI propagation
        # Mirror lag — wheels usually propagate in 30-60s after the Release
        # workflow's Upload to PyPI step finishes. Two PyPI endpoints have
        # independent propagation paths:
        #   - /pypi/<name>/<ver>/json  ← JSON API (faster propagation)
        #   - /simple/<name>/          ← simple index (what `pip install` uses)
        # v2.0.2's PRLV hit the case where the JSON API had the version
        # but the simple index didn't yet, and `pip install ==2.0.2`
        # 404'd. Poll the SIMPLE INDEX (the one pip actually consults)
        # so the gate passes only when the install will work.
        run: |
          set -eux
          DEADLINE=$((SECONDS + 300))
          VER="${{ steps.ver.outputs.version }}"
          while [ $SECONDS -lt $DEADLINE ]; do
              if curl -fsS "https://pypi.org/simple/ciris-verify/" 2>/dev/null | grep -qE "ciris.verify-${VER//./\\.}\b"; then
                  echo "ciris-verify $VER is on the PyPI simple index"
                  break
              fi
              echo "waiting for PyPI simple-index propagation..."
              sleep 15
          done
          # Final sanity-check; if the loop fell through we want a clean
          # error rather than letting `pip install` 404.
          curl -fsS "https://pypi.org/simple/ciris-verify/" 2>/dev/null | grep -qE "ciris.verify-${VER//./\\.}\b" || {
              echo "::error::ciris-verify $VER never appeared on PyPI simple index within 5 min"
              exit 1
          }

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install libtss2 runtime (Linux wheel TPM dep)
        # The Linux x86_64 wheel is built with `--features tpm` (see
        # release.yml), so its bundled libciris_verify_ffi.so dlopen()s
        # libtss2-tctildr.so.0 at load time. Stock Ubuntu runners don't
        # carry libtss2; without this step `ctypes.CDLL(...)` raises
        # OSError before any verify_tree work can run.
        # NB: downstream consumers of the Linux wheel hit the same
        # requirement — this isn't CI-specific. Tracked as a follow-up
        # to consider a no-TPM wheel for non-TPM hosts.
        run: |
          sudo apt-get update
          # libtss2-dev pulls in all the runtime libtss2-* packages as
          # transitive deps. Matches what release.yml uses for the build
          # step, so the runtime exactly mirrors the build environment.
          sudo apt-get install -y libtss2-dev

      - name: Install ciris-verify from PyPI (bundled .so)
        run: pip install "ciris-verify==${{ steps.ver.outputs.version }}"

      - name: Wheel version round-trip (Python FFI surface)
        run: |
          set -eux
          INSTALLED=$(python -c "from ciris_verify import get_library_version; print(get_library_version())")
          test "$INSTALLED" = "${{ steps.ver.outputs.version }}"

      - name: Cross-project attestation (#10 lock)
        # Single engine instance reads:
        #   - its own L1/L2 manifests under ?project=ciris-verify
        #   - the agent's L4 build under ?project=ciris-agent
        # Pre-v1.12.0 this 404'd because the engine reused self.registry_client
        # (project=ciris-verify) for the agent fetch. v1.12.0 made project
        # per-call, so one client serves both.
        #
        # 2.8.3 is the live ciris-agent registered version as of 2026-05-06.
        # If that version is later marked deprecated/removed, bump this.
        #
        # tracing logs go to stderr; merge to stdout so grep can see the
        # STEP 3/5 line.
        run: |
          set -o pipefail
          OUT=$(./target/release/ciris-verify attest --version 2.8.3 \
                                                    --agent-project ciris-agent \
                                                    --project ciris-verify 2>&1)
          echo "$OUT"
          echo "$OUT" | grep -E "VERIFY STEP 3/5 COMPLETE: OK"
          echo "$OUT" | grep -E "Agent build record fetch \(project=ciris-agent\)"

      - name: Failover hostname resolution (#11 lock)
        # Each regional fallback host must resolve. Pre-v1.12.0 these were
        # `registry-us` / `registry-eu` (NXDOMAIN) and `eu.registry.ciris-
        # services-eu-1.com` (also NXDOMAIN — wrong sub-zone AND TLD).
        run: |
          set -eux
          for h in us.registry.ciris-services-1.ai \
                   eu.registry.ciris-services-1.ai \
                   api.registry.ciris-services-1.ai; do
              getent hosts "$h"
          done

      - name: Runtime tree verifier — Python FFI (#9 lock, v1.13.0+)
        # Gates the public verify_tree() API against the live registry.
        # Two assertions:
        #   (a) Walk a synthetic tree, query a non-existent version. The
        #       walk must succeed (total_hash populated, sha256: prefix);
        #       the registry compare must surface the 404 in
        #       registry_error rather than crashing.
        #   (b) Walk a fake tree against the live ciris-agent 2.8.3
        #       manifest. expected_total_hash must populate (proves
        #       wire-format end-to-end), registry_match must be False
        #       (proves the diff loop categorizes drift correctly), and
        #       failed_files must include both MISSING (every real
        #       agent file) and EXTRA (our fake.py).
        #
        # CIRIS_SKIP_EARLY_VERIFY suppresses the .init_array constructor's
        # network fetch which can deadlock on dlopen() in some runtime
        # contexts (Python/FFI). Documented in constructor.rs.
        #
        # Skipped pre-v1.13.0 — the verify_tree symbol won't exist in
        # earlier wheels and the import would fail.
        env:
          CIRIS_SKIP_EARLY_VERIFY: "1"
          PUBLISHED_VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -eux
          python - <<'PYEOF'
          import os, sys, tempfile

          v = os.environ["PUBLISHED_VERSION"]
          parts = [int(p.split('-')[0]) for p in v.split('.')[:3]]
          if tuple(parts) < (1, 13, 0):
              print(f"SKIP: verify_tree() landed in 1.13.0; this is {v}")
              sys.exit(0)

          from ciris_verify import verify_tree, TreeVerifyRequest

          # (a) walk-only: synthetic tree, registry returns 404
          with tempfile.TemporaryDirectory() as tmp:
              os.makedirs(os.path.join(tmp, "pkg"))
              with open(os.path.join(tmp, "pkg", "a.py"), "w") as f:
                  f.write("# a\n")
              with open(os.path.join(tmp, "pkg", "b.py"), "w") as f:
                  f.write("# b\n")
              r = verify_tree(TreeVerifyRequest(
                  root=tmp,
                  include_roots=["pkg"],
                  exempt_dirs=["__pycache__"],
                  exempt_extensions=["pyc"],
                  project="ciris-agent",
                  binary_version="99.99.99-not-a-real-version",
              ))
              assert r.files_checked == 2, f"expected 2 files, got {r.files_checked}"
              assert r.total_hash.startswith("sha256:"), r.total_hash
              assert len(r.total_hash) == 7 + 64, r.total_hash
              assert r.valid is False
              assert r.registry_match is False
              assert r.registry_error is not None, "expected 404 in registry_error"
              err_low = r.registry_error.lower()
              assert "404" in r.registry_error or "not found" in err_low, r.registry_error
              assert r.expected_total_hash is None
              print(f"(a) walk-only OK: total={r.total_hash[:24]}...")

          # (b) live registry: ciris-agent 2.8.3 expected_total_hash populated.
          # v1.14.0+ split: Mismatch + Extra in failed_files; Missing in
          # missing_files. Fake tree has 1 file (fake.py) → 1 EXTRA + 1630
          # MISSING. registry_match=False (strict: missing != 0); valid=False
          # (Extra IS a tampering signal, fails valid).
          with tempfile.TemporaryDirectory() as tmp:
              os.makedirs(os.path.join(tmp, "ciris_engine"))
              with open(os.path.join(tmp, "ciris_engine", "fake.py"), "w") as f:
                  f.write("# not the real agent\n")
              r = verify_tree(TreeVerifyRequest(
                  root=tmp,
                  include_roots=["ciris_engine"],
                  exempt_dirs=[],
                  exempt_extensions=[],
                  project="ciris-agent",
                  binary_version="2.8.3",
              ))
              assert r.registry_error is None, \
                  f"live registry should be reachable: {r.registry_error}"
              assert r.expected_total_hash is not None
              assert r.expected_total_hash.startswith("sha256:")
              assert r.registry_match is False, \
                  "strict registry_match must reject the fake tree"
              # v1.14.0+ wire shape: missing_files separate. Pre-1.14 wheels
              # land Missing in failed_files together with Mismatch+Extra.
              if tuple(parts) >= (1, 14, 0):
                  assert len(r.missing_files) >= 1000, \
                      f"expected many MISSING, got {len(r.missing_files)}"
                  missing_kinds = {f.kind.value for f in r.missing_files}
                  assert missing_kinds == {"missing"}, missing_kinds
                  failed_kinds = {f.kind.value for f in r.failed_files}
                  # The fake.py we planted should show up as Extra.
                  assert "extra" in failed_kinds, failed_kinds
                  assert "missing" not in failed_kinds, \
                      "v1.14: Missing must NOT be in failed_files"
                  # And valid must be False because of the Extra (tampering signal).
                  assert r.valid is False, \
                      "valid must be False when Extra is present"
                  print(f"(b) live registry OK (v1.14+ split): "
                        f"expected={r.expected_total_hash[:24]}..., "
                        f"failed={len(r.failed_files)} missing={len(r.missing_files)}")
              else:
                  # Pre-v1.14.0 (1.13.x) wheels: Missing still in failed_files.
                  assert len(r.failed_files) >= 1000, \
                      f"expected many MISSING in failed_files (1.13.x), got {len(r.failed_files)}"
                  kinds = {f.kind.value for f in r.failed_files}
                  assert "missing" in kinds, kinds
                  assert "extra" in kinds, kinds
                  print(f"(b) live registry OK (1.13.x): "
                        f"expected={r.expected_total_hash[:24]}..., "
                        f"failed_files={len(r.failed_files)}")

          # (c) v1.14.0+: missing-only must keep valid=True (the desktop
          # platform-asymmetric case CIRISAgent#15 was about). Synthesize
          # by hand-walking against a directory that's a STRICT SUBSET of
          # the registered manifest — every disk file matches its
          # registered hash; some registered files are absent.
          if tuple(parts) >= (1, 14, 0):
              # We'd need a real ciris-agent install for a clean
              # subset-test. The fake.py path can't reach this state
              # (it's an Extra, not a subset). For the gate, the unit
              # tests in tree_verify::tests cover this invariant; here
              # we just confirm v1.14 has the missing_files field
              # populated when it should be.
              print(f"(c) v1.14.0 verdict semantics — missing_files field "
                    f"present and populated correctly above")
          PYEOF
