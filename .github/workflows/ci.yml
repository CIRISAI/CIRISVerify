name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

# Auto-cancel superseded CI runs. Without this, every push to a PR branch starts
# a fresh full matrix while the prior push's run keeps churning to completion —
# stacking obsolete runs that starve the runner pool (the cause of the slow-CI
# congestion). One run per ref: a new push cancels the branch's in-flight CI.
# Keyed on the ref so different branches/PRs never cancel each other; `main` is
# protected from accidental cancel by excluding it from the group below.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # crates.io fetch hardening. The recurring CI failure
  #   `download of <crate> failed: curl failed … OpenSSL SSL_read: unexpected eof`
  # is an HTTP/2 multiplexing stream-drop against the crates.io CDN, not a real
  # build error. Force HTTP/1.1 (no multiplexing), retry downloads aggressively,
  # and raise the per-op timeout so a transient drop never fails the job.
  CARGO_NET_RETRY: "10"
  CARGO_HTTP_MULTIPLEXING: "false"
  CARGO_NET_TIMEOUT: "60"

# CIRISCache (CIRISVerify#126 / CIRISServer#99): the GHCR-backed cross-repo Rust
# build cache. `restore` is anonymous (public package); `save` (main only)
# pushes to ghcr.io/cirisai/ciriscache via GITHUB_TOKEN, which needs
# packages:write. PRs restore but never save, so fork PRs are unaffected.
permissions:
  contents: read
  packages: write

jobs:
  # ==========================================================================
  # Version Consistency Check
  # ==========================================================================
  version-check:
    name: Version Consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check version consistency
        run: |
          set -e
          # Extract versions from all sources
          CARGO_VERSION=$(grep -m1 '^version = ' Cargo.toml | sed 's/version = "\(.*\)"/\1/')
          PYPROJECT_VERSION=$(grep -m1 '^version = ' bindings/python/pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          PYTHON_VERSION=$(grep '__version__ = ' bindings/python/ciris_verify/__init__.py | sed 's/__version__ = "\(.*\)"/\1/')

          echo "Cargo.toml (workspace): $CARGO_VERSION"
          echo "pyproject.toml:         $PYPROJECT_VERSION"
          echo "Python __version__:     $PYTHON_VERSION"

          # Check all versions match
          if [ "$CARGO_VERSION" != "$PYPROJECT_VERSION" ]; then
            echo "ERROR: Cargo.toml ($CARGO_VERSION) != pyproject.toml ($PYPROJECT_VERSION)"
            exit 1
          fi

          if [ "$CARGO_VERSION" != "$PYTHON_VERSION" ]; then
            echo "ERROR: Cargo.toml ($CARGO_VERSION) != Python __version__ ($PYTHON_VERSION)"
            exit 1
          fi

          echo "✓ All versions match: $CARGO_VERSION"

  # ==========================================================================
  # Threat-model doc integrity (CIRISVerify#54, Gap G / F-AV-MAINT)
  # --------------------------------------------------------------------------
  # A PR that edits an authoritative governance / threat-model doc MUST
  # also record WHAT changed and WHY in that doc's changelog block near
  # the top. This is the cheap structural half of F-AV-MAINT mitigation
  # (paired with the CODEOWNERS two-person rule + the doc_integrity
  # crypto substrate). It makes a silent F-AV-status downgrade visible:
  # you can't change the doc without leaving a diffable provenance line.
  # Only runs on pull_request (needs the base ref for the diff).
  # ==========================================================================
  threat-model-changelog:
    name: Threat-model changelog guard
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Require a changelog delta on authoritative-doc edits
        run: |
          set -e
          BASE="origin/${{ github.base_ref }}"
          git fetch origin "${{ github.base_ref }}" --depth=1 >/dev/null 2>&1 || true
          # Authoritative docs whose edits demand a changelog delta.
          GUARDED="docs/FEDERATION_THREAT_MODEL.md docs/THREAT_MODEL.md MISSION.md"
          CHANGED=$(git diff --name-only "$BASE"...HEAD || true)
          fail=0
          for doc in $GUARDED; do
            if echo "$CHANGED" | grep -qx "$doc"; then
              echo "Authoritative doc edited: $doc"
              # The changelog provenance lives in the first ~40 lines
              # (version stamp + 'vX deltas' block). Require that an
              # edit touches one of those lines — i.e. the diff hunk
              # headers cover the header region OR a 'deltas'/'Last
              # updated'/'Version' line appears in the added lines.
              ADDED=$(git diff "$BASE"...HEAD -- "$doc" | grep '^+' || true)
              if echo "$ADDED" | grep -qiE '(deltas vs|Last updated|^\+\*\*Version\*\*|revision log|changelog)'; then
                echo "  ✓ changelog provenance updated"
              else
                echo "  ✗ $doc changed WITHOUT a changelog delta (version stamp / 'deltas' / 'Last updated' line)."
                echo "    Per CIRISVerify#54 (F-AV-MAINT), every authoritative-doc edit must record what changed + why."
                fail=1
              fi
            fi
          done
          if [ "$fail" -ne 0 ]; then exit 1; fi
          echo "✓ Threat-model changelog guard passed"

  # ==========================================================================
  # Code Quality
  # ==========================================================================
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Repair toolchain if rustup-init shadow (cache-poison heal)
        # v2.1.2 detected; v2.1.3 moved after cache restore; v2.1.4 active heal.
        # macOS runners occasionally cache a `~/.cargo/bin/cargo` that IS the
        # rustup-init shim binary. The shim passes `cargo --version` through
        # (any CLI accepts --version), but `cargo build` triggers the shim's
        # argv parser and fails with "unexpected argument 'build' found".
        # Passive `rustup default stable` doesn't help because the rustup
        # binary may share the same shim. Active heal: probe via
        # `cargo build --help` output, nuke ~/.cargo/bin, reinstall toolchain.
        # Seen on x86_64 + arm64 macOS (v2.1.1 run 25894815013;
        # v2.1.3 run 25895938932 Test/macos-latest). The cache-bin: false on
        # the Swatinem step above prevents future poison-then-restore cycles.
        # shell: bash forces Git Bash on Windows runners (default is pwsh,
        # which can't parse the if/then/fi syntax below).
        shell: bash
        run: |
          if cargo build --help 2>&1 | grep -q "rustup-init"; then
            echo "::warning::Detected rustup-init shadow in ~/.cargo/bin; reinstalling toolchain"
            rm -rf "$HOME/.cargo/bin"
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | \
              sh -s -- -y --default-toolchain stable --profile minimal --no-modify-path
            export PATH="$HOME/.cargo/bin:$PATH"
          fi
          rustup default stable
          cargo --version
          cargo build --help >/dev/null
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2
        # CI hardening (v2.1.1+): cache restore is a speedup, not a
        # correctness gate. A flaky runner / Actions infra hiccup should
        # downgrade to "build from scratch this run", not abort the job.
        # Real test/lint/compile failures still fail as before.
        continue-on-error: true
        with:
          # v2.1.4+: exclude ~/.cargo/bin to prevent rustup-init shadow
          # poisoning. See ci.yml comment block above.
          cache-bin: false
      # Note: --all-features excluded because TPM feature requires system libs
      - name: Repair toolchain if rustup-init shadow (cache-poison heal)
        # v2.1.2 detected; v2.1.3 moved after cache restore; v2.1.4 active heal.
        # macOS runners occasionally cache a `~/.cargo/bin/cargo` that IS the
        # rustup-init shim binary. The shim passes `cargo --version` through
        # (any CLI accepts --version), but `cargo build` triggers the shim's
        # argv parser and fails with "unexpected argument 'build' found".
        # Passive `rustup default stable` doesn't help because the rustup
        # binary may share the same shim. Active heal: probe via
        # `cargo build --help` output, nuke ~/.cargo/bin, reinstall toolchain.
        # Seen on x86_64 + arm64 macOS (v2.1.1 run 25894815013;
        # v2.1.3 run 25895938932 Test/macos-latest). The cache-bin: false on
        # the Swatinem step above prevents future poison-then-restore cycles.
        # shell: bash forces Git Bash on Windows runners (default is pwsh,
        # which can't parse the if/then/fi syntax below).
        shell: bash
        run: |
          if cargo build --help 2>&1 | grep -q "rustup-init"; then
            echo "::warning::Detected rustup-init shadow in ~/.cargo/bin; reinstalling toolchain"
            rm -rf "$HOME/.cargo/bin"
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | \
              sh -s -- -y --default-toolchain stable --profile minimal --no-modify-path
            export PATH="$HOME/.cargo/bin:$PATH"
          fi
          rustup default stable
          cargo --version
          cargo build --help >/dev/null
      - run: cargo clippy --all-targets -- -D warnings

  # ==========================================================================
  # Security Audit
  # ==========================================================================
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Repair toolchain if rustup-init shadow (cache-poison heal)
        # v2.1.2 detected; v2.1.3 moved after cache restore; v2.1.4 active heal.
        # macOS runners occasionally cache a `~/.cargo/bin/cargo` that IS the
        # rustup-init shim binary. The shim passes `cargo --version` through
        # (any CLI accepts --version), but `cargo build` triggers the shim's
        # argv parser and fails with "unexpected argument 'build' found".
        # Passive `rustup default stable` doesn't help because the rustup
        # binary may share the same shim. Active heal: probe via
        # `cargo build --help` output, nuke ~/.cargo/bin, reinstall toolchain.
        # Seen on x86_64 + arm64 macOS (v2.1.1 run 25894815013;
        # v2.1.3 run 25895938932 Test/macos-latest). The cache-bin: false on
        # the Swatinem step above prevents future poison-then-restore cycles.
        # shell: bash forces Git Bash on Windows runners (default is pwsh,
        # which can't parse the if/then/fi syntax below).
        shell: bash
        run: |
          if cargo build --help 2>&1 | grep -q "rustup-init"; then
            echo "::warning::Detected rustup-init shadow in ~/.cargo/bin; reinstalling toolchain"
            rm -rf "$HOME/.cargo/bin"
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | \
              sh -s -- -y --default-toolchain stable --profile minimal --no-modify-path
            export PATH="$HOME/.cargo/bin:$PATH"
          fi
          rustup default stable
          cargo --version
          cargo build --help >/dev/null
      # CI hardening (v2.1.1+): retry on transient timeout only.
      # Real install failures (404, auth, typo) still fail immediately.
      - name: Install cargo-audit (retry on timeout)
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 2
          retry_wait_seconds: 30
          retry_on: timeout
          command: cargo install cargo-audit
      - name: Run security audit
        run: cargo audit

  deny:
    name: Cargo Deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          log-level: warn
          command: check
          arguments: ""

  # ==========================================================================
  # Tests (using cargo-nextest for reliable parallel execution)
  # ==========================================================================
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      # CIRISCache (CIRISVerify#126) — GHCR-backed cross-repo Rust cache,
      # replacing Swatinem/rust-cache (unlimited GHCR storage, survives the
      # tag-ref boundary, cross-repo-capable). Hardened continue-on-error so a
      # cache miss/infra hiccup downgrades to a cold build, never failing the
      # job; real test/lint/compile failures still fail as before.
      - uses: CIRISAI/CIRISCache/restore@v1
        continue-on-error: true
      - name: Repair toolchain if rustup-init shadow (cache-poison heal)
        # macOS runners can restore a `~/.cargo/bin/cargo` that IS the
        # rustup-init shim binary. The shim passes `cargo --version` through
        # (any CLI accepts --version), but `cargo build` triggers the shim's
        # argv parser and fails with "unexpected argument 'build' found".
        # Active heal: probe via `cargo build --help`, nuke ~/.cargo/bin,
        # reinstall the toolchain. Kept defensive across the cache swap.
        # shell: bash forces Git Bash on Windows runners (default is pwsh,
        # which can't parse the if/then/fi syntax below).
        shell: bash
        run: |
          if cargo build --help 2>&1 | grep -q "rustup-init"; then
            echo "::warning::Detected rustup-init shadow in ~/.cargo/bin; reinstalling toolchain"
            rm -rf "$HOME/.cargo/bin"
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | \
              sh -s -- -y --default-toolchain stable --profile minimal --no-modify-path
            export PATH="$HOME/.cargo/bin:$PATH"
          fi
          rustup default stable
          cargo --version
          cargo build --help >/dev/null

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest
      - name: Build
        run: cargo build
      - name: Run all tests with nextest
        # nextest handles parallel execution properly and detects hung tests.
        # --profile ci: bounded retries for CI-runner-transient flakes +
        # a hang-terminate timeout. See .config/nextest.toml.
        run: cargo nextest run --all --profile ci
        env:
          PROPTEST_CASES: 64

      # Save the warmed cache (main only; PRs restore but never save).
      - uses: CIRISAI/CIRISCache/save@v1
        if: github.ref == 'refs/heads/main'
        continue-on-error: true
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  # ==========================================================================
  # Feature-gated crypto tests (v4.10.0+, CIRISVerify#58)
  # --------------------------------------------------------------------------
  # `nextest run --all` above uses DEFAULT features per crate (--all-features
  # is excluded because the TPM feature needs system libs). ciris-crypto's
  # default does NOT include key-grant / hybrid-kex / ml-kem, so the
  # feature-gated crypto — key_grant v1+v2 DEK wrap, hybrid X25519+ML-KEM-768
  # KEX, ML-KEM-768 KEM — was running CI-dark. This job exercises that
  # surface explicitly. It is security-critical (the §10.5.3 harvest-now-
  # decrypt-later DEK wrap) so a regression here MUST fail CI.
  # ==========================================================================
  crypto-features:
    name: Crypto feature-gated tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        continue-on-error: true
        with:
          cache-bin: false
      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest
      - name: Test ciris-crypto with full crypto feature set
        run: |
          cargo nextest run -p ciris-crypto --profile ci \
            --features ecdsa-p256,ed25519,secp256k1,random,aes-gcm,kdf,hmac,pqc-ml-dsa,x25519,ml-kem,hybrid-kex,key-grant,xchacha,hpke,scope-privacy
        env:
          PROPTEST_CASES: 64

  # ==========================================================================
  # Build Matrix - Native Platforms
  # ==========================================================================
  build-native:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: libciris_verify_ffi.so

          # Linux ARM64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: libciris_verify_ffi.so
            cross: true

          # macOS x86_64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: libciris_verify_ffi.dylib

          # macOS ARM64 (Apple Silicon)
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: libciris_verify_ffi.dylib

          # Windows x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: ciris_verify_ffi.dll

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # CIRISCache (CIRISVerify#126) — the **canonical cross-repo key** pinned in
      # CIRISServer#99. The <PLAT> token is derived from the BUILD TARGET triple
      # (not the runner host), so it is byte-identical to the per-platform key
      # CIRISServer computes — and each of verify's 5 cross-matrix targets maps to
      # a DISTINCT platform token, so there is no host collision and NO -<target>
      # suffix is needed (the suffix is what defeated CIRISServer's cross-repo
      # restore; CIRISVerify#153). For verify p=e=none (no ciris-persist /
      # ciris-edge dep), v=ciris-verify-core's resolved version — so verify keeps
      # its own compiled blob but shares the always-on ~/.cargo registry blob with
      # the other repos. NB: coarse whole-dir target/ reuse across repos is
      # fingerprint-sensitive (feature flags differ); the reliable cross-repo win
      # is the cargo registry/git layer — key alignment is the prerequisite either
      # way (#153 item 3).
      - name: Compute CIRISCache key (canonical, CIRISServer#99 / #153)
        shell: bash
        run: |
          RUSTC=$(rustc -V | awk '{print $2}')
          # `|| true` so a crate absent from Cargo.lock (verify has no
          # ciris-persist / ciris-edge) yields empty instead of grep's exit-1
          # aborting under GitHub bash's `set -e -o pipefail` — then ${X:-none}
          # supplies the slot. (The CIRISServer#99 snippet omits this and trips
          # `set -e`; flagged back there + on the persist/edge adopters.)
          ver() { { grep -A1 "name = \"$1\"" Cargo.lock | grep -m1 '^version' | sed -E 's/.*"([^"]+)".*/\1/'; } || true; }
          P=$(ver ciris-persist); E=$(ver ciris-edge); V=$(ver ciris-verify-core)
          # Canonical <PLAT> token from the target triple — must match the table
          # CIRISServer#99 uses for the equivalent platform (linux/macos use the
          # x86_64/aarch64 arch spelling, NOT the runner's x64/arm64 token).
          case "${{ matrix.target }}" in
            x86_64-unknown-linux-gnu)  PLAT="linux-x86_64" ;;
            aarch64-unknown-linux-gnu) PLAT="linux-aarch64" ;;
            x86_64-apple-darwin)       PLAT="macos-x86_64" ;;
            aarch64-apple-darwin)      PLAT="macos-aarch64" ;;
            x86_64-pc-windows-msvc)    PLAT="windows-x64" ;;
            *) PLAT="${{ matrix.target }}" ;;  # fail-safe: keep the triple for an unmapped target
          esac
          KEY="ciris-substrate-v1-${PLAT}-release-rustc${RUSTC}-p${P:-none}-e${E:-none}-v${V:-none}"
          echo "CIRISCACHE_KEY=${KEY}" >> "$GITHUB_ENV"
      - uses: CIRISAI/CIRISCache/restore@v1
        continue-on-error: true
        with:
          key: ${{ env.CIRISCACHE_KEY }}

      # Install cross for ARM64 Linux

      - name: Repair toolchain if rustup-init shadow (cache-poison heal)
        # v2.1.2 detected; v2.1.3 moved after cache restore; v2.1.4 active heal.
        # macOS runners occasionally cache a `~/.cargo/bin/cargo` that IS the
        # rustup-init shim binary. The shim passes `cargo --version` through
        # (any CLI accepts --version), but `cargo build` triggers the shim's
        # argv parser and fails with "unexpected argument 'build' found".
        # Passive `rustup default stable` doesn't help because the rustup
        # binary may share the same shim. Active heal: probe via
        # `cargo build --help` output, nuke ~/.cargo/bin, reinstall toolchain.
        # Seen on x86_64 + arm64 macOS (v2.1.1 run 25894815013;
        # v2.1.3 run 25895938932 Test/macos-latest). The cache-bin: false on
        # the Swatinem step above prevents future poison-then-restore cycles.
        # shell: bash forces Git Bash on Windows runners (default is pwsh,
        # which can't parse the if/then/fi syntax below).
        shell: bash
        run: |
          if cargo build --help 2>&1 | grep -q "rustup-init"; then
            echo "::warning::Detected rustup-init shadow in ~/.cargo/bin; reinstalling toolchain"
            rm -rf "$HOME/.cargo/bin"
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | \
              sh -s -- -y --default-toolchain stable --profile minimal --no-modify-path
            export PATH="$HOME/.cargo/bin:$PATH"
          fi
          rustup default stable
          cargo --version
          cargo build --help >/dev/null
      - name: Install cross (retry on timeout)
        if: matrix.cross
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 2
          retry_wait_seconds: 30
          retry_on: timeout
          command: cargo install cross --git https://github.com/cross-rs/cross

      # Build with cross for ARM64 Linux
      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }} -p ciris-verify-ffi

      # Build native
      - name: Build (native)
        if: ${{ !matrix.cross }}
        run: cargo build --release --target ${{ matrix.target }} -p ciris-verify-ffi

      # Upload artifacts
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ciris-verify-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/${{ matrix.artifact }}
          if-no-files-found: warn

      # Save the warmed cache under the canonical key (main only).
      - uses: CIRISAI/CIRISCache/save@v1
        if: github.ref == 'refs/heads/main'
        continue-on-error: true
        with:
          key: ${{ env.CIRISCACHE_KEY }}
          token: ${{ secrets.GITHUB_TOKEN }}

  # ==========================================================================
  # Build Matrix - Android
  # ==========================================================================
  build-android:
    name: Build (Android ${{ matrix.abi }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-linux-android
            abi: arm64-v8a
          - target: armv7-linux-androideabi
            abi: armeabi-v7a
          - target: x86_64-linux-android
            abi: x86_64

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        # CI hardening (v2.1.1+): cache restore is a speedup, not a
        # correctness gate. A flaky runner / Actions infra hiccup should
        # downgrade to "build from scratch this run", not abort the job.
        # Real test/lint/compile failures still fail as before.
        continue-on-error: true
        with:
          # v2.1.4+: exclude ~/.cargo/bin to prevent rustup-init shadow
          # poisoning. See ci.yml comment block above.
          cache-bin: false
          key: android-${{ matrix.abi }}

      # CIRISCache (CIRISVerify#126 / #155) — canonical cross-repo key for the
      # android PLAT. <PLAT> = android-<abi> (matches the edge + persist
      # convention) so downstream mobile lanes hit verify's substrate-leaf blob.
      # Restored AFTER Swatinem so the canonical GHCR blob wins; p=e=none for
      # verify (no ciris-persist / ciris-edge dep), v=ciris-verify-core.
      - name: Compute CIRISCache key (canonical, CIRISServer#99 / #155)
        shell: bash
        run: |
          RUSTC=$(rustc -V | awk '{print $2}')
          ver() { { grep -A1 "name = \"$1\"" Cargo.lock | grep -m1 '^version' | sed -E 's/.*"([^"]+)".*/\1/'; } || true; }
          P=$(ver ciris-persist); E=$(ver ciris-edge); V=$(ver ciris-verify-core)
          KEY="ciris-substrate-v1-android-${{ matrix.abi }}-release-rustc${RUSTC}-p${P:-none}-e${E:-none}-v${V:-none}"
          echo "CIRISCACHE_KEY=${KEY}" >> "$GITHUB_ENV"
      - uses: CIRISAI/CIRISCache/restore@v1
        continue-on-error: true
        with:
          key: ${{ env.CIRISCACHE_KEY }}

      - name: Repair toolchain if rustup-init shadow (cache-poison heal)
        # v2.1.2 detected; v2.1.3 moved after cache restore; v2.1.4 active heal.
        # macOS runners occasionally cache a `~/.cargo/bin/cargo` that IS the
        # rustup-init shim binary. The shim passes `cargo --version` through
        # (any CLI accepts --version), but `cargo build` triggers the shim's
        # argv parser and fails with "unexpected argument 'build' found".
        # Passive `rustup default stable` doesn't help because the rustup
        # binary may share the same shim. Active heal: probe via
        # `cargo build --help` output, nuke ~/.cargo/bin, reinstall toolchain.
        # Seen on x86_64 + arm64 macOS (v2.1.1 run 25894815013;
        # v2.1.3 run 25895938932 Test/macos-latest). The cache-bin: false on
        # the Swatinem step above prevents future poison-then-restore cycles.
        # shell: bash forces Git Bash on Windows runners (default is pwsh,
        # which can't parse the if/then/fi syntax below).
        shell: bash
        run: |
          if cargo build --help 2>&1 | grep -q "rustup-init"; then
            echo "::warning::Detected rustup-init shadow in ~/.cargo/bin; reinstalling toolchain"
            rm -rf "$HOME/.cargo/bin"
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | \
              sh -s -- -y --default-toolchain stable --profile minimal --no-modify-path
            export PATH="$HOME/.cargo/bin:$PATH"
          fi
          rustup default stable
          cargo --version
          cargo build --help >/dev/null

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26b
          add-to-path: true

      - name: Set NDK environment
        run: |
          echo "ANDROID_NDK_HOME=${{ steps.setup-ndk.outputs.ndk-path }}" >> $GITHUB_ENV
          echo "NDK_HOME=${{ steps.setup-ndk.outputs.ndk-path }}" >> $GITHUB_ENV

      - name: Install cargo-ndk (retry on timeout)
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 2
          retry_wait_seconds: 30
          retry_on: timeout
          command: cargo install cargo-ndk

      - name: Build for Android
        run: cargo ndk -t ${{ matrix.abi }} build --release -p ciris-verify-ffi --features android

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ciris-verify-android-${{ matrix.abi }}
          path: target/${{ matrix.target }}/release/libciris_verify_ffi.so
          if-no-files-found: warn

      # CIRISCache (CIRISVerify#126 / #155): publish the warm verify blob (main
      # only) so downstream mobile lanes (CIRISEdge android-ndk, sibling repos)
      # HIT the substrate-leaf verify layer on android instead of recompiling
      # ML-DSA / ML-KEM / HPKE / Ed25519 / X25519 + keyring from scratch.
      - uses: CIRISAI/CIRISCache/save@v1
        if: github.ref == 'refs/heads/main'
        continue-on-error: true
        with:
          key: ${{ env.CIRISCACHE_KEY }}
          token: ${{ secrets.GITHUB_TOKEN }}

  # ==========================================================================
  # Build Matrix - iOS
  # ==========================================================================
  build-ios:
    name: Build (iOS ${{ matrix.target }})
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-ios
            sdk: iphoneos
          - target: aarch64-apple-ios-sim
            sdk: iphonesimulator

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        # CI hardening (v2.1.1+): cache restore is a speedup, not a
        # correctness gate. A flaky runner / Actions infra hiccup should
        # downgrade to "build from scratch this run", not abort the job.
        # Real test/lint/compile failures still fail as before.
        continue-on-error: true
        with:
          # v2.1.4+: exclude ~/.cargo/bin to prevent rustup-init shadow
          # poisoning. See ci.yml comment block above.
          cache-bin: false
          key: ios-${{ matrix.target }}

      # CIRISCache (CIRISVerify#126 / #155) — canonical cross-repo key for the
      # ios PLAT. <PLAT> = ios-<target> (matches the edge + persist convention)
      # so downstream mobile lanes hit verify's substrate-leaf blob. Restored
      # AFTER Swatinem so the canonical GHCR blob wins; p=e=none for verify,
      # v=ciris-verify-core.
      - name: Compute CIRISCache key (canonical, CIRISServer#99 / #155)
        shell: bash
        run: |
          RUSTC=$(rustc -V | awk '{print $2}')
          ver() { { grep -A1 "name = \"$1\"" Cargo.lock | grep -m1 '^version' | sed -E 's/.*"([^"]+)".*/\1/'; } || true; }
          P=$(ver ciris-persist); E=$(ver ciris-edge); V=$(ver ciris-verify-core)
          KEY="ciris-substrate-v1-ios-${{ matrix.target }}-release-rustc${RUSTC}-p${P:-none}-e${E:-none}-v${V:-none}"
          echo "CIRISCACHE_KEY=${KEY}" >> "$GITHUB_ENV"
      - uses: CIRISAI/CIRISCache/restore@v1
        continue-on-error: true
        with:
          key: ${{ env.CIRISCACHE_KEY }}

      - name: Repair toolchain if rustup-init shadow (cache-poison heal)
        # v2.1.2 detected; v2.1.3 moved after cache restore; v2.1.4 active heal.
        # macOS runners occasionally cache a `~/.cargo/bin/cargo` that IS the
        # rustup-init shim binary. The shim passes `cargo --version` through
        # (any CLI accepts --version), but `cargo build` triggers the shim's
        # argv parser and fails with "unexpected argument 'build' found".
        # Passive `rustup default stable` doesn't help because the rustup
        # binary may share the same shim. Active heal: probe via
        # `cargo build --help` output, nuke ~/.cargo/bin, reinstall toolchain.
        # Seen on x86_64 + arm64 macOS (v2.1.1 run 25894815013;
        # v2.1.3 run 25895938932 Test/macos-latest). The cache-bin: false on
        # the Swatinem step above prevents future poison-then-restore cycles.
        # shell: bash forces Git Bash on Windows runners (default is pwsh,
        # which can't parse the if/then/fi syntax below).
        shell: bash
        run: |
          if cargo build --help 2>&1 | grep -q "rustup-init"; then
            echo "::warning::Detected rustup-init shadow in ~/.cargo/bin; reinstalling toolchain"
            rm -rf "$HOME/.cargo/bin"
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | \
              sh -s -- -y --default-toolchain stable --profile minimal --no-modify-path
            export PATH="$HOME/.cargo/bin:$PATH"
          fi
          rustup default stable
          cargo --version
          cargo build --help >/dev/null

      - name: Build for iOS
        run: cargo build --release --target ${{ matrix.target }} -p ciris-verify-ffi --features ios

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ciris-verify-ios-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/libciris_verify_ffi.a
          if-no-files-found: warn

      # CIRISCache (CIRISVerify#126 / #155): publish the warm verify blob (main
      # only) so downstream mobile lanes (CIRISEdge build-ios / ios-pyo3, sibling
      # repos) HIT the substrate-leaf verify layer on ios instead of recompiling
      # ML-DSA / ML-KEM / HPKE / Ed25519 / X25519 + keyring from scratch.
      - uses: CIRISAI/CIRISCache/save@v1
        if: github.ref == 'refs/heads/main'
        continue-on-error: true
        with:
          key: ${{ env.CIRISCACHE_KEY }}
          token: ${{ secrets.GITHUB_TOKEN }}

