[package]
name = "ciris-verify-core"
description = "Core verification logic for CIRISVerify"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true

[features]
default = ["pqc"]
pqc = ["ciris-crypto/pqc-ml-dsa"]
android = ["ciris-keyring/android"]
ios = ["ciris-keyring/ios"]
tpm = ["ciris-keyring/tpm"]
tpm-windows = ["ciris-keyring/tpm-windows"]  # Experimental: Windows native TPM

[[bin]]
name = "ciris-verify"
path = "src/bin/ciris_verify.rs"

[dependencies]
# Internal crates
ciris-keyring.workspace = true
ciris-crypto.workspace = true

# Async
tokio.workspace = true
async-trait.workspace = true
futures.workspace = true

# CLI
clap = { version = "4.5", features = ["derive"] }

# Serialization
serde = { workspace = true, features = ["derive"] }
serde_json.workspace = true
prost.workspace = true

# Error handling
thiserror.workspace = true
anyhow.workspace = true

# Logging
tracing.workspace = true
tracing-subscriber.workspace = true

# Time
chrono.workspace = true

# DNS resolution
hickory-resolver.workspace = true

# TLS (for DNS-over-HTTPS with bundled certs)
# Note: hickory-resolver 0.24 pins rustls 0.21 internally.
# We keep rustls 0.21 here for API compatibility.
# RUSTSEC-2026-0098/0099 are ignored in deny.toml (low risk for our use case).
rustls = { version = "0.21", default-features = false }
webpki-roots = "0.25"

# HTTP client
reqwest.workspace = true

# Crypto utilities
sha2.workspace = true
hkdf = "0.12"
base64.workspace = true
hex.workspace = true
ed25519-dalek.workspace = true

# Authenticated encryption
chacha20poly1305 = "0.10"

# Random
rand.workspace = true

# Constant-time comparison
subtle = "2.6"

# Platform-specific
libc = "0.2"

# Binary parsing (Mach-O __TEXT segment hashing for iOS code-sign stability)
goblin.workspace = true

# v4.3.0 (CIRISPersist#132): rusqlite at the unconditional level so
# every target gets rusqlite. The Android-only target table further
# down adds the `bundled` feature for Android; every other target
# (Linux / macOS / Windows / iOS) inherits this base entry and links
# dynamically against the platform's libsqlite3.
rusqlite.workspace = true

# SQLite for audit trail verification.
#
# v4.3.0 (CIRISPersist#132 / CIRISPersist#133): `bundled` is Android-
# only. Pre-4.3.0 the workspace default + a wide
# `cfg(not(target_os = "ios"))` override BOTH activated `bundled`,
# producing a statically-linked libsqlite3 in every desktop wheel.
# When ciris-persist.so + ciris-edge.so were both loaded into the
# same Python process (cohabitation, see persist's
# docs/COHABITATION.md), each cdylib carried its own libsqlite3
# instance + its own `sqlite3GlobalConfig` static. Edge's libsqlite3
# was never `sqlite3_initialize`d → first mallocWithAlarm indirected
# through a NULL xMalloc slot → SIGSEGV in production (CIRISEdge#50).
#
# v4.3.0 narrows `bundled` to Android only — the NDK libsqlite3 isn't
# guaranteed across vendor builds, and Android's app-sandbox model
# makes static linking the conventional posture. Linux / macOS /
# Windows / iOS all link dynamically against the platform's
# libsqlite3, sharing one instance across cdylibs via dlopen.
#
# iOS still must use system SQLite — bundled SQLite exports duplicate
# sqlite3_* symbols that conflict with Apple's system SQLite (Apple's
# SQLiteDatabaseTracking hooks at SQLiteDatabaseTracking.cpp
# assert-fail on connections from the foreign copy, the same trap
# CIRISVerify v1.6.4 originally documented). iOS picks up the
# workspace-level rusqlite (no bundled) by virtue of NOT matching
# the Android target table below.
# Blocking HTTP client for Android/iOS (tokio async I/O broken on JNI/iOS threads)
[target.'cfg(any(target_os = "android", target_os = "ios"))'.dependencies]
# ureq with rustls for blocking HTTPS (bypasses broken tokio async I/O)
ureq = { version = "2.9", default-features = false, features = ["tls", "json"] }
# Bundled Mozilla CA certs (native-certs doesn't work on mobile)
webpki-roots-mobile = { package = "webpki-roots", version = "0.26" }
# Force ring backend for rustls (aws-lc-rs has mobile issues)
rustls-mobile = { package = "rustls", version = "0.23", default-features = false, features = ["ring", "std", "tls12"] }

[target.'cfg(target_os = "android")'.dependencies]
# v4.3.0 (CIRISPersist#132): rusqlite `bundled` for Android. NDK
# libsqlite3 isn't guaranteed across vendor builds; Android's app-
# sandbox convention is static linking. See the rationale comment
# before the rusqlite workspace entry for the full story.
rusqlite = { version = "0.31", features = ["bundled"] }
# Android system properties API (for emulator detection)
android_system_properties = "0.1"

[target.'cfg(target_os = "windows")'.dependencies]
windows-sys = { version = "0.52", features = [
    "Win32_Foundation",
    "Win32_System_Threading",
    "Win32_System_Diagnostics_Debug",
] }

[build-dependencies]
prost-build = "0.12"

[dev-dependencies]
tokio = { workspace = true, features = ["rt-multi-thread", "macros"] }
proptest = { workspace = true }
pretty_assertions = { workspace = true }
tempfile = "3"
criterion.workspace = true

[[bench]]
name = "build_manifest"
harness = false

[[bench]]
name = "transparency_merkle"
harness = false

[[bench]]
name = "key_derivation"
harness = false
